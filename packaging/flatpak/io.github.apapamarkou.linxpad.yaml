app-id: io.github.apapamarkou.linxpad
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: linxpad

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=home
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: python3-pyqt6
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps PyQt6 PyQt6-sip PyQt6-Qt6
    sources:
      - type: shell
        commands: []

  - name: python3-watchdog
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps watchdog
    sources:
      - type: shell
        commands: []

  - name: linxpad
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps .
      - install -Dm644 src/linxpad/icons/linxpad.png
          /app/share/icons/hicolor/256x256/apps/io.github.apapamarkou.linxpad.png
      - install -Dm644 packaging/specs/linxpad.desktop
          /app/share/applications/io.github.apapamarkou.linxpad.desktop
      - desktop-file-edit --set-key=Icon
          --set-value=io.github.apapamarkou.linxpad
          /app/share/applications/io.github.apapamarkou.linxpad.desktop
    sources:
      - type: dir
        path: ../..
